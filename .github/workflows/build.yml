name: Build & update rule-set

on:
  schedule:
    - cron: "30 20 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "build.py"
      - ".github/workflows/build.yml"

permissions:
  contents: write

concurrency:
  group: build-ruleset
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box (latest prerelease)
        run: |
          set -euo pipefail
          VER=$(curl -fsSL "https://api.github.com/repos/SagerNet/sing-box/releases?per_page=50" | jq -r '[.[] | select(.draft == false and .prerelease == true)] | sort_by(.published_at) | last | .tag_name')
          if [ -z "$VER" ] || [ "$VER" = "null" ]; then echo "no prerelease found" >&2; exit 1; fi
          VNUM=${VER#v}
          echo "Using sing-box ${VER}"
          curl -fsSL "https://github.com/SagerNet/sing-box/releases/download/${VER}/sing-box-${VNUM}-linux-amd64.tar.gz" -o /tmp/sing-box.tar.gz
          tar -xzf /tmp/sing-box.tar.gz -C /tmp
          sudo install "/tmp/sing-box-${VNUM}-linux-amd64/sing-box" /usr/local/bin/sing-box
          sing-box version

      - name: Build JSON rule-set
        run: python3 build.py

      - name: Compile SRS binary
        run: sing-box rule-set compile --output rules/geosite-cn.srs rules/geosite-cn.json

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules/geosite-cn.json rules/geosite-cn.srs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update geosite-cn ($(date -u +%Y-%m-%d))"
            git push
          fi
